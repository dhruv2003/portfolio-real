<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Furthest shadow (Cyan) -->
  <rect x="4" y="4" width="40" height="40" fill="#38BDF8" stroke="#000000" stroke-width="4" />
  
  <!-- Middle shadow (Pink) -->
  <rect x="12" y="12" width="40" height="40" fill="#FF90E8" stroke="#000000" stroke-width="4" />
  
  <!-- Front card (Yellow) -->
  <rect x="20" y="20" width="40" height="40" fill="#FFC900" stroke="#000000" stroke-width="4" />
</svg>
